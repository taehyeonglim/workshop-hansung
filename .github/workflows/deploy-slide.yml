name: Deploy workshop slide deck

on:
  push:
    branches:
      - main
    paths:
      - "발표자료/slide/**"
      - ".github/workflows/deploy-slide.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload slide deck
        uses: actions/upload-pages-artifact@v4
        with:
          path: "발표자료/slide"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
